<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth-client.js"></script>
  <script src="theme.js"></script>
</head>
<body class="admin-page">
  <header class="dash-header">
    <div class="dash-header-left">
      <img class="cafe-logo" src="" alt="logo" style="display:none;height:28px;width:28px;object-fit:contain;border-radius:6px;">
      <h1>Admin Panel</h1>
    </div>
    <a href="cashier.html" class="header-link">Cashier ?</a>
  </header>

  <main class="admin-main">
    <div id="theme-section"></div>

    <section class="admin-form-card" id="team-card">
      <h2>Team Members</h2>
      <p class="theme-hint">Add registered users to this cafe so they can access the app with the right role.</p>
      <div class="form-grid team-grid">
        <div class="field"><label for="team-uid">User UID</label><input id="team-uid" type="text" placeholder="Firebase UID"></div>
        <div class="field"><label for="team-email">Email</label><input id="team-email" type="email" placeholder="member@cafe.com"></div>
        <div class="field"><label for="team-name">Display Name</label><input id="team-name" type="text" placeholder="Team member name"></div>
        <div class="field"><label for="team-role">Role</label><select id="team-role"><option value="cashier">Cashier</option><option value="waiter">Waiter</option><option value="admin">Admin</option></select></div>
      </div>
      <div class="form-actions">
        <button class="btn-primary" id="team-add-btn">Add Member</button>
        <button class="btn-ghost hidden" id="team-cancel-btn">Cancel</button>
      </div>
      <p class="form-error hidden" id="team-error"></p>
      <div class="team-list-wrap" style="margin-top:18px;">
        <div class="list-header"><h3 style="margin:0;">Current Team</h3><span class="item-count" id="team-count">-</span></div>
        <div id="team-list"><div class="loading-state"><div class="spinner"></div><p>Loading...</p></div></div>
      </div>
    </section>

    <section class="admin-form-card">
      <h2 id="form-title">Add New Item</h2>
      <div class="form-grid">
        <div class="field">
          <label for="f-name">Name</label>
          <input id="f-name" type="text" placeholder="e.g. Cappuccino">
        </div>
        <div class="field">
          <label for="f-price">Price (Rs)</label>
          <input id="f-price" type="number" min="1" step="0.01" placeholder="e.g. 4.50">
        </div>
        <div class="field">
          <label for="f-category">Category</label>
          <select id="f-category">
            <option value="Coffee">Coffee</option>
            <option value="Tea">Tea</option>
            <option value="Juices & Shakes">Juices &amp; Shakes</option>
            <option value="Beverages">Beverages</option>
            <option value="Snacks">Snacks</option>
            <option value="Mains">Mains</option>
            <option value="Desserts">Desserts</option>
            <option value="Bakery">Bakery</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field">
          <label for="f-image">Image URL <span class="optional">(optional)</span></label>
          <input id="f-image" type="url" placeholder="https://example.com/image.jpg">
        </div>
        <div class="field full">
          <label for="f-desc">Description</label>
          <input id="f-desc" type="text" placeholder="Short description (optional)">
        </div>
        <div class="field full img-preview-wrap hidden" id="img-preview-wrap">
          <img id="img-preview" src="" alt="Preview" class="img-preview">
          <span class="img-preview-label">Preview</span>
        </div>
        <div class="field checkbox-field">
          <label class="checkbox-label">
            <input id="f-available" type="checkbox" checked>
            Available on menu
          </label>
        </div>
        <div class="field checkbox-field">
          <label class="checkbox-label trending-label">
            <input id="f-trending" type="checkbox">
            Mark as Trending
          </label>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-primary" id="submit-btn">Add Item</button>
        <button class="btn-ghost hidden" id="cancel-btn">Cancel</button>
      </div>
      <p class="form-error hidden" id="form-error"></p>
    </section>

    <section class="admin-list-section">
      <div class="list-header">
        <h2>Menu Items</h2>
        <span class="item-count" id="item-count">-</span>
      </div>
      <div id="admin-list">
        <div class="loading-state"><div class="spinner"></div><p>Loading...</p></div>
      </div>
    </section>
  </main>

  <div class="toast hidden" id="toast"></div>

  <script>
    const CATEGORIES = ['Coffee','Tea','Juices & Shakes','Beverages','Snacks','Mains','Desserts','Bakery','Other'];
    let items = [];
    let teamMembers = [];
    let editingId = null;
    let editingTeamUid = null;
    let currentSession = null;
    let unsubscribeMenu = null;

    document.addEventListener('DOMContentLoaded', async () => {
      currentSession = await window.QRCafeAuth.requireRoleAccess(['owner', 'admin'], 'dashboard.html');
      if (!currentSession) return;
      unsubscribeMenu = await window.QRCafeApp.subscribeMenuItems(currentSession.cafeId, (nextItems) => {
        items = nextItems;
        document.getElementById('item-count').textContent = items.length + ' items';
        renderList();
      });
      await loadTeamMembers();
      document.getElementById('submit-btn').addEventListener('click', handleSubmit);
      document.getElementById('cancel-btn').addEventListener('click', cancelEdit);
      document.getElementById('team-add-btn').addEventListener('click', handleTeamSubmit);
      document.getElementById('team-cancel-btn').addEventListener('click', cancelTeamEdit);
      renderThemeSection();

      document.getElementById('f-image').addEventListener('input', e => {
        const url = e.target.value.trim();
        const wrap = document.getElementById('img-preview-wrap');
        const img  = document.getElementById('img-preview');
        if (url) {
          img.src = url;
          img.onload  = () => wrap.classList.remove('hidden');
          img.onerror = () => wrap.classList.add('hidden');
        } else {
          wrap.classList.add('hidden');
        }
      });
    });

    function renderList() {
      const el = document.getElementById('admin-list');
      if (items.length === 0) {
        el.innerHTML = '<p class="error-msg">No items yet. Add one above!</p>';
        return;
      }

      const groups = {};
      CATEGORIES.forEach(c => groups[c] = []);
      items.forEach(item => {
        const cat = item.category || 'Other';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(item);
      });

      let html = '';
      CATEGORIES.forEach(cat => {
        if (!groups[cat] || groups[cat].length === 0) return;
        html += '<div class="admin-category-group">';
        html += '<div class="admin-category-label">' + cat + ' <span class="cat-count-badge">' + groups[cat].length + '</span></div>';
        groups[cat].forEach(item => {
          html += `
            <div class="admin-item-row ${item.available ? '' : 'unavail'}">
              ${item.image_url ? `<img src="${esc(item.image_url)}" alt="${esc(item.name)}" class="admin-item-img" onerror="this.style.display='none'">` : `<div class="admin-item-img-placeholder">Item</div>`}
              <div class="admin-item-info">
                <span class="admin-item-name">${esc(item.name)}</span>
                ${item.is_trending ? '<span class="trending-badge">Trending</span>' : ''}
                <span class="admin-item-price">Rs ${(item.price / 100).toFixed(2)}</span>
                ${item.description ? `<span class="admin-item-desc">${esc(item.description)}</span>` : ''}
                <span class="avail-badge ${item.available ? 'yes' : 'no'}">${item.available ? 'Available' : 'Hidden'}</span>
              </div>
              <div class="admin-item-actions">
                <button class="btn-sm btn-trend ${item.is_trending ? 'active-trend' : ''}" data-id="${item.id}" data-trending="${item.is_trending}">Trend</button>
                <button class="btn-sm btn-edit" data-id="${item.id}">Edit</button>
                <button class="btn-sm btn-toggle" data-id="${item.id}" data-avail="${item.available}">${item.available ? 'Disable' : 'Enable'}</button>
                <button class="btn-sm btn-delete" data-id="${item.id}">Delete</button>
              </div>
            </div>`;
        });
        html += '</div>';
      });

      el.innerHTML = html;
      el.querySelectorAll('.btn-edit').forEach(b => b.addEventListener('click', () => startEdit(b.dataset.id)));
      el.querySelectorAll('.btn-toggle').forEach(b => b.addEventListener('click', () => toggleAvail(b.dataset.id, b.dataset.avail === 'true')));
      el.querySelectorAll('.btn-delete').forEach(b => b.addEventListener('click', () => deleteItem(b.dataset.id)));
      el.querySelectorAll('.btn-trend').forEach(b => b.addEventListener('click', () => toggleTrending(b.dataset.id, b.dataset.trending === 'true')));
    }

    async function loadTeamMembers() {
      try {
        teamMembers = await window.QRCafeApp.getTeamMembers(currentSession.cafeId);
        document.getElementById('team-count').textContent = teamMembers.length + ' members';
        renderTeamList();
      } catch (err) {
        document.getElementById('team-list').innerHTML = '<p class="error-msg">Unable to load team members.</p>';
      }
    }

    async function handleSubmit() {
      const name = document.getElementById('f-name').value.trim();
      const priceRaw = parseFloat(document.getElementById('f-price').value);
      const desc = document.getElementById('f-desc').value.trim();
      const imageUrl = document.getElementById('f-image').value.trim();
      const available = document.getElementById('f-available').checked;
      const category = document.getElementById('f-category').value;
      const trending = document.getElementById('f-trending').checked;

      if (!name) return showError('Name is required.');
      if (!priceRaw || priceRaw <= 0 || isNaN(priceRaw)) return showError('Enter a valid price.');
      const price = Math.round(priceRaw * 100);

      const payload = { name, price, description: desc, available, image_url: imageUrl || null, category, is_trending: trending };
      const isEdit = editingId !== null;
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      try {
        if (isEdit) {
          await window.QRCafeApp.updateMenuItem(currentSession.cafeId, editingId, payload);
        } else {
          await window.QRCafeApp.createMenuItem(currentSession.cafeId, payload);
        }
        showToast(isEdit ? 'Item updated!' : 'Item added to ' + category + '!');
        cancelEdit();
      } catch (err) {
        showError(err.message || 'Something went wrong.');
      } finally {
        btn.disabled = false;
      }
    }

    function startEdit(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      editingId = id;
      document.getElementById('f-name').value = item.name;
      document.getElementById('f-price').value = (item.price / 100).toFixed(2);
      document.getElementById('f-desc').value = item.description || '';
      document.getElementById('f-image').value = item.image_url || '';
      document.getElementById('f-available').checked = item.available;
      document.getElementById('f-trending').checked = item.is_trending || false;
      document.getElementById('f-category').value = item.category || 'Other';

      if (item.image_url) {
        const img = document.getElementById('img-preview');
        const wrap = document.getElementById('img-preview-wrap');
        img.src = item.image_url;
        img.onload = () => wrap.classList.remove('hidden');
      }

      document.getElementById('form-title').textContent = 'Edit: ' + item.name;
      document.getElementById('submit-btn').textContent = 'Save Changes';
      document.getElementById('cancel-btn').classList.remove('hidden');
      document.querySelector('.admin-form-card').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() {
      editingId = null;
      document.getElementById('f-name').value = '';
      document.getElementById('f-price').value = '';
      document.getElementById('f-desc').value = '';
      document.getElementById('f-image').value = '';
      document.getElementById('f-available').checked = true;
      document.getElementById('f-trending').checked = false;
      document.getElementById('f-category').value = 'Coffee';
      document.getElementById('img-preview-wrap').classList.add('hidden');
      document.getElementById('form-title').textContent = 'Add New Item';
      document.getElementById('submit-btn').textContent = 'Add Item';
      document.getElementById('cancel-btn').classList.add('hidden');
      hideError();
    }

    async function toggleTrending(id, current) {
      try {
        await window.QRCafeApp.updateMenuItem(currentSession.cafeId, id, { is_trending: !current });
        showToast(!current ? 'Marked as Trending!' : 'Removed from Trending.');
      } catch {
        showToast('Failed to update.', 'error');
      }
    }

    async function toggleAvail(id, current) {
      try {
        await window.QRCafeApp.updateMenuItem(currentSession.cafeId, id, { available: !current });
        showToast(current ? 'Item hidden from menu.' : 'Item is now available.');
      } catch {
        showToast('Failed to update.', 'error');
      }
    }

    async function deleteItem(id) {
      const item = items.find(i => i.id === id);
      if (!confirm('Delete "' + (item ? item.name : id) + '"? This cannot be undone.')) return;
      try {
        await window.QRCafeApp.deleteMenuItem(currentSession.cafeId, id);
        showToast('Item deleted.');
      } catch {
        showToast('Failed to delete.', 'error');
      }
    }

    function renderThemeSection() {
      const t = window.CafeTheme ? window.CafeTheme.get() : {};
      const brandColor = t.brandColor || '#c8773a';
      const bgColor = t.bgColor || '#f7f4f0';
      const surfaceColor = t.surfaceColor || '#ffffff';
      const textColor = t.textColor || '#1a1714';
      const fontFamily = t.fontFamily || 'DM Sans';
      const cafeName = t.cafeName || 'Our Cafe';
      const logoUrl = t.logoUrl || '';
      const gstNumber = t.gstNumber || '';
      const fssaiNumber = t.fssaiNumber || '';
      const restaurantPhone = t.restaurantPhone || '';
      const restaurantAddress = t.restaurantAddress || '';

      document.getElementById('theme-section').innerHTML = `
        <section class="admin-form-card theme-section">
          <h2>Theme Settings</h2>
          <p class="theme-hint">Changes apply instantly across all pages.</p>
          <div class="theme-grid">
            <div class="theme-field"><label>Cafe Name</label><input type="text" id="t-name" value="${esc(cafeName)}" placeholder="Our Cafe"></div>
            <div class="theme-field"><label>Logo URL <span class="optional">(optional)</span></label><input type="url" id="t-logo" value="${esc(logoUrl)}" placeholder="https://..."></div>
            <div class="theme-field"><label>GST Number</label><input type="text" id="t-gst" value="${esc(gstNumber)}" placeholder="e.g. 27ABCDE1234F1Z5"></div>
            <div class="theme-field"><label>FSSAI Number</label><input type="text" id="t-fssai" value="${esc(fssaiNumber)}" placeholder="e.g. 12345678901234"></div>
            <div class="theme-field"><label>Restaurant Phone</label><input type="tel" id="t-phone" value="${esc(restaurantPhone)}" placeholder="9876543210"></div>
            <div class="theme-field full"><label>Restaurant Address</label><input type="text" id="t-address" value="${esc(restaurantAddress)}" placeholder="Full business address"></div>
            <div class="theme-field logo-preview-wrap" id="logo-preview-wrap" style="${logoUrl ? '' : 'display:none'}"><img id="logo-preview-img" src="${esc(logoUrl)}" alt="logo preview"><span>Logo Preview</span></div>
            <div class="theme-field"><label>Brand Color</label><div class="color-row"><input type="color" id="t-brand" value="${brandColor}"><span class="color-val" id="t-brand-val">${brandColor}</span></div></div>
            <div class="theme-field"><label>Background Color</label><div class="color-row"><input type="color" id="t-bg" value="${bgColor}"><span class="color-val" id="t-bg-val">${bgColor}</span></div></div>
            <div class="theme-field"><label>Surface Color <span class="optional">(cards)</span></label><div class="color-row"><input type="color" id="t-surface" value="${surfaceColor}"><span class="color-val" id="t-surface-val">${surfaceColor}</span></div></div>
            <div class="theme-field"><label>Text Color</label><div class="color-row"><input type="color" id="t-text" value="${textColor}"><span class="color-val" id="t-text-val">${textColor}</span></div></div>
            <div class="theme-field full"><label>Font</label><div class="font-options" id="font-options">${['DM Sans','Poppins','Nunito','Inter'].map(f => '<button class="font-btn ' + (fontFamily === f ? 'active' : '') + '" data-font="' + f + '" style="font-family:' + f + ',sans-serif">' + f + '</button>').join('')}</div></div>
          </div>
          <div class="theme-actions"><button class="btn-primary" id="save-theme-btn">Save Theme</button><button class="btn-ghost" id="reset-theme-btn">Reset to Default</button></div>
        </section>`;

      ['brand','bg','surface','text'].forEach(key => {
        document.getElementById('t-' + key).addEventListener('input', e => {
          document.getElementById('t-' + key + '-val').textContent = e.target.value;
          previewTheme();
        });
      });

      document.getElementById('t-logo').addEventListener('input', e => {
        const url = e.target.value.trim();
        const wrap = document.getElementById('logo-preview-wrap');
        const img = document.getElementById('logo-preview-img');
        if (url) {
          img.src = url;
          img.onload = () => { wrap.style.display = 'flex'; };
          img.onerror = () => { wrap.style.display = 'none'; };
        } else {
          wrap.style.display = 'none';
        }
        previewTheme();
      });

      document.getElementById('font-options').addEventListener('click', e => {
        const btn = e.target.closest('.font-btn');
        if (!btn) return;
        document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        previewTheme();
      });

      document.getElementById('save-theme-btn').addEventListener('click', saveTheme);
      document.getElementById('reset-theme-btn').addEventListener('click', resetTheme);
    }

    function renderTeamList() {
      const el = document.getElementById('team-list');
      if (!teamMembers.length) {
        el.innerHTML = '<p class="error-msg">No team members yet. Add one above.</p>';
        return;
      }

      el.innerHTML = teamMembers.map((member) => `
        <div class="admin-item-row">
          <div class="admin-item-info">
            <span class="admin-item-name">${esc(member.display_name || member.email || member.uid)}</span>
            <span class="admin-item-desc">${esc(member.email || member.uid)}</span>
            <span class="avail-badge yes">${esc(member.role)}</span>
            <span class="avail-badge ${member.status === 'active' ? 'yes' : 'no'}">${esc(member.status || 'active')}</span>
          </div>
          <div class="admin-item-actions">
            <button class="btn-sm btn-edit" data-team-uid="${esc(member.uid)}">Edit</button>
            <button class="btn-sm btn-delete" data-team-uid="${esc(member.uid)}">Remove</button>
          </div>
        </div>`).join('');

      el.querySelectorAll('[data-team-uid]').forEach((btn) => {
        const uid = btn.dataset.teamUid;
        if (btn.classList.contains('btn-edit')) {
          btn.addEventListener('click', () => startTeamEdit(uid));
        }
        if (btn.classList.contains('btn-delete')) {
          btn.addEventListener('click', () => removeTeam(uid));
        }
      });
    }

    async function handleTeamSubmit() {
      const uid = document.getElementById('team-uid').value.trim();
      const email = document.getElementById('team-email').value.trim();
      const display_name = document.getElementById('team-name').value.trim();
      const role = document.getElementById('team-role').value;

      if (!uid || !email) return showTeamError('User UID and email are required.');

      const btn = document.getElementById('team-add-btn');
      btn.disabled = true;
      hideTeamError();
      try {
        if (editingTeamUid) {
          await window.QRCafeApp.updateTeamMember(currentSession.cafeId, editingTeamUid, { role });
          showToast('Team member updated!');
        } else {
          await window.QRCafeApp.addTeamMember(currentSession.cafeId, { uid, email, display_name, role });
          showToast('Team member added!');
        }
        cancelTeamEdit();
        await loadTeamMembers();
      } catch (err) {
        showTeamError(err.message || 'Failed to save team member.');
      } finally {
        btn.disabled = false;
      }
    }

    function startTeamEdit(uid) {
      const member = teamMembers.find((m) => m.uid === uid);
      if (!member) return;
      editingTeamUid = uid;
      document.getElementById('team-uid').value = member.uid;
      document.getElementById('team-email').value = member.email || '';
      document.getElementById('team-name').value = member.display_name || '';
      document.getElementById('team-role').value = member.role || 'cashier';
      document.getElementById('team-uid').disabled = true;
      document.getElementById('team-email').disabled = true;
      document.getElementById('team-name').disabled = true;
      document.getElementById('team-add-btn').textContent = 'Save Member';
      document.getElementById('team-cancel-btn').classList.remove('hidden');
    }

    function cancelTeamEdit() {
      editingTeamUid = null;
      document.getElementById('team-uid').value = '';
      document.getElementById('team-email').value = '';
      document.getElementById('team-name').value = '';
      document.getElementById('team-role').value = 'cashier';
      document.getElementById('team-uid').disabled = false;
      document.getElementById('team-email').disabled = false;
      document.getElementById('team-name').disabled = false;
      document.getElementById('team-add-btn').textContent = 'Add Member';
      document.getElementById('team-cancel-btn').classList.add('hidden');
      hideTeamError();
    }

    async function removeTeam(uid) {
      const member = teamMembers.find((m) => m.uid === uid);
      if (!confirm('Remove ' + (member ? member.display_name || member.email || uid : uid) + ' from team?')) return;
      try {
        await window.QRCafeApp.removeTeamMember(currentSession.cafeId, uid);
        showToast('Team member removed.');
        await loadTeamMembers();
      } catch (err) {
        showTeamError(err.message || 'Failed to remove member.');
      }
    }

    function getFormThemeValues() {
      const activeFont = document.querySelector('.font-btn.active');
      return {
        cafeName: document.getElementById('t-name').value.trim() || 'Our Cafe',
        logoUrl: document.getElementById('t-logo').value.trim(),
        gstNumber: document.getElementById('t-gst').value.trim(),
        fssaiNumber: document.getElementById('t-fssai').value.trim(),
        restaurantPhone: document.getElementById('t-phone').value.trim(),
        restaurantAddress: document.getElementById('t-address').value.trim(),
        brandColor: document.getElementById('t-brand').value,
        bgColor: document.getElementById('t-bg').value,
        surfaceColor: document.getElementById('t-surface').value,
        textColor: document.getElementById('t-text').value,
        fontFamily: activeFont ? activeFont.dataset.font : 'DM Sans',
      };
    }

    function previewTheme() {
      if (window.CafeTheme) window.CafeTheme.apply({ ...window.CafeTheme.get(), ...getFormThemeValues() });
    }

    async function saveTheme() {
      if (window.CafeTheme) await window.CafeTheme.save(getFormThemeValues());
      showToast('Theme saved! All pages updated.');
    }

    async function resetTheme() {
      if (!confirm('Reset to default theme?')) return;
      if (window.CafeTheme) await window.CafeTheme.reset();
      renderThemeSection();
      showToast('Theme reset to default.');
    }

    function showError(msg) {
      const el = document.getElementById('form-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('form-error').classList.add('hidden');
    }

    function showTeamError(msg) {
      const el = document.getElementById('team-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function hideTeamError() {
      document.getElementById('team-error').classList.add('hidden');
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (type || 'success');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    function esc(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    window.addEventListener('beforeunload', () => {
      if (typeof unsubscribeMenu === 'function') unsubscribeMenu();
    });
  </script>
</body>
