<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan QR Code - Cafe Menu</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth-client.js"></script>
  <script src="theme.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="scan-container">
    <div class="scan-brand">
      <img class="cafe-logo" src="" alt="logo" style="display:none;height:40px;width:40px;object-fit:contain;border-radius:8px;">
      <h1 class="cafe-name-text">Our Cafe</h1>
    </div>
    <p class="instruction">Scan this QR using your phone to open the menu.</p>
    <div class="qr-code"><div id="qr-code"></div></div>
    <p class="table-info">Table #1</p>
    <p class="hint" id="scan-hint">Point your camera at the QR code to view our menu on your phone.</p>
  </div>
  <style>
    .qr-code { margin: 20px auto; display: flex; justify-content: center; align-items: center; min-height: 300px; }
    #qr-code { max-width: 100%; height: auto; }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const tableNumber = params.get('table') || '1';
      let cafeId = params.get('cafe_id');
      if (!cafeId && window.QRCafeApp) {
        cafeId = await window.QRCafeApp.getCurrentCafeId();
      }
      document.querySelector('.table-info').textContent = 'Table #' + tableNumber;

      if (!cafeId) {
        document.getElementById('scan-hint').textContent = 'Add ?cafe_id=YOUR_CAFE_ID to the URL or sign in first to generate a menu QR.';
        return;
      }

      const menuUrl = window.QRCafeApp.buildMenuUrl(cafeId, tableNumber);
      new QRCode(document.getElementById('qr-code'), {
        text: menuUrl,
        width: 300,
        height: 300,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H,
      });
      document.getElementById('scan-hint').textContent = menuUrl;
    });
  </script>
</body>
</html>
