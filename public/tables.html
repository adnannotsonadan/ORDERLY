<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tables - QR Cafe</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth-client.js"></script>
  <script src="theme.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="admin-page">
  <header class="dash-header"><div class="dash-header-left"><img class="cafe-logo" src="" alt="logo" style="display:none;height:28px;width:28px;object-fit:contain;border-radius:6px;"><h1>Tables & QR Codes</h1></div><div class="dash-header-right"><a href="dashboard.html" class="header-link">Dashboard</a></div></header>
  <main class="admin-main">
    <section class="admin-form-card"><h2>Add Table</h2><div class="form-grid"><div class="field"><label>Table Number</label><input type="number" id="t-number" min="1"></div><div class="field"><label>Label</label><input type="text" id="t-label" placeholder="Window Seat"></div></div><div class="form-actions"><button class="btn-primary" id="add-table-btn">Add Table</button></div><p class="form-error hidden" id="table-error"></p></section>
    <section class="admin-list-section"><div class="list-header"><h2>Your Tables</h2><span class="item-count" id="table-count">-</span></div><div id="tables-list"><div class="loading-state"><div class="spinner"></div><p>Loading...</p></div></div></section>
  </main>
  <div class="qr-modal hidden" id="qr-modal" role="dialog" aria-modal="true" aria-labelledby="qr-modal-title"><div class="qr-modal-box"><div class="qr-modal-header"><h3 id="qr-modal-title">QR Code</h3><button class="cart-close" id="qr-modal-close" aria-label="Close QR dialog">×</button></div><div id="qr-code-box" style="display:flex;justify-content:center;align-items:center;min-height:250px"></div><p class="qr-url" id="qr-url"></p><div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn-primary" id="copy-url-btn">Copy URL</button><button class="btn-primary" onclick="window.print()">Print</button></div></div></div>
  <div class="overlay hidden" id="overlay"></div><div class="toast hidden" id="toast"></div>
  <script>
    let tables = [];
    let unsubscribeTables = null;
    let currentSession = null;

    document.addEventListener('DOMContentLoaded', async () => {
      currentSession = await window.QRCafeAuth.requireRoleAccess(['owner', 'admin'], 'dashboard.html');
      if (!currentSession) return;
      document.getElementById('add-table-btn').addEventListener('click', addTable);
      document.getElementById('qr-modal-close').addEventListener('click', closeQR);
      document.getElementById('copy-url-btn').addEventListener('click', copyUrl);
      document.getElementById('overlay').addEventListener('click', closeQR);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !document.getElementById('qr-modal').classList.contains('hidden')) closeQR();
        if (e.key === 'Tab' && !document.getElementById('qr-modal').classList.contains('hidden')) trapFocus(e);
      });
      unsubscribeTables = await window.QRCafeApp.subscribeTables(currentSession.cafeId, (nextTables) => {
        tables = nextTables;
        document.getElementById('table-count').textContent = tables.length + ' tables';
        renderTables();
      });
    });

    function renderTables() {
      const el = document.getElementById('tables-list');
      if (!tables.length) {
        el.innerHTML = '<p class="error-msg">No tables yet.</p>';
        return;
      }
      el.innerHTML = tables.map(t => `<div class="admin-item-row"><div class="admin-item-info"><span class="admin-item-name">Table #${t.number}</span><span class="admin-item-desc">${esc(t.label || '')}</span></div><div class="admin-item-actions"><button class="btn-sm btn-edit" data-id="${t.id}">QR</button><button class="btn-sm btn-delete" data-id="${t.id}">Delete</button></div></div>`).join('');
      el.querySelectorAll('.btn-edit').forEach(btn => btn.addEventListener('click', () => showQR(btn.dataset.id)));
      el.querySelectorAll('.btn-delete').forEach(btn => btn.addEventListener('click', () => deleteTable(btn.dataset.id)));
    }

    async function addTable() {
      const number = parseInt(document.getElementById('t-number').value, 10);
      const label = document.getElementById('t-label').value.trim();
      const error = document.getElementById('table-error');
      error.classList.add('hidden');
      try {
        await window.QRCafeApp.createTable(currentSession.cafeId, { number, label });
        document.getElementById('t-number').value = '';
        document.getElementById('t-label').value = '';
        showToast('Table added.');
      } catch (err) {
        error.textContent = err.message || 'Failed to add table';
        error.classList.remove('hidden');
      }
    }

    async function deleteTable(id) {
      if (!confirm('Delete this table?')) return;
      try {
        await window.QRCafeApp.deleteTable(currentSession.cafeId, id);
        showToast('Table deleted.');
      } catch {
        showToast('Failed to delete table.', 'error');
      }
    }

    async function showQR(id) {
      try {
        const table = await window.QRCafeApp.getTable(currentSession.cafeId, id);
        if (!table) throw new Error('Table not found');
        const url = window.QRCafeApp.buildMenuUrl(currentSession.cafeId, table.number);
        document.getElementById('qr-url').textContent = url;
        document.getElementById('qr-modal-title').textContent = 'Table #' + table.number;
        const box = document.getElementById('qr-code-box');
        box.innerHTML = '';
        new QRCode(box, {
          text: url,
          width: 250,
          height: 250,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H,
        });
        document.getElementById('qr-modal').classList.remove('hidden');
        document.getElementById('overlay').classList.remove('hidden');
        document.getElementById('qr-modal-close').focus();
      } catch {
        showToast('Failed to generate QR.', 'error');
      }
    }

    function closeQR() {
      document.getElementById('qr-modal').classList.add('hidden');
      document.getElementById('overlay').classList.add('hidden');
    }

    async function copyUrl() {
      const url = document.getElementById('qr-url').textContent;
      try {
        await navigator.clipboard.writeText(url);
        showToast('URL copied!');
      } catch {
        showToast('Failed to copy URL.', 'error');
      }
    }

    function trapFocus(e) {
      const modal = document.getElementById('qr-modal');
      const focusable = [...modal.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])')];
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (e.shiftKey ? document.activeElement === first : document.activeElement === last) {
        e.preventDefault();
        (e.shiftKey ? last : first).focus();
      }
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (type || 'success');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    window.addEventListener('beforeunload', () => {
      if (typeof unsubscribeTables === 'function') unsubscribeTables();
    });
  </script>
</body>
</html>
